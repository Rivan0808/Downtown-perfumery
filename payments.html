<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Premium Fragrances</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background: linear-gradient(180deg, rgba(30,0,43,1) 0%, rgba(20,0,30,1) 100%);
            color: #f5f2eb;
            padding: 60px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-title {
            font-family: 'Georgia', serif;
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fdfaf2;
            margin-bottom: 10px;
        }

        .secure-notice {
            font-size: 0.85rem;
            color: #d1c7bd;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Two-Column Layout split */
        .checkout-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 850px) {
            .checkout-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Block Containers */
        .checkout-card {
            background: rgba(74, 12, 38, 0.15); 
            border: 1px solid rgba(74, 12, 38, 0.3);
            border-radius: 4px;
            padding: 30px;
        }

        .card-heading {
            font-family: 'Georgia', serif;
            font-size: 1.3rem;
            color: #fdfaf2;
            margin-bottom: 25px;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(245, 242, 235, 0.1);
            padding-bottom: 12px;
        }

        /* Order Summary Items Styling */
        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(245, 242, 235, 0.05);
        }

        .item-details h4 {
            font-family: 'Georgia', serif;
            font-size: 1.05rem;
            color: #fdfaf2;
            margin-bottom: 4px;
        }

        .item-details p {
            font-size: 0.8rem;
            color: #d1c7bd;
        }

        .item-total-price {
            font-weight: 600;
            color: #dfba73;
        }

        /* Pricing Totals Rows */
        .totals-section {
            margin-top: 20px;
            padding-top: 15px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.95rem;
            color: #d1c7bd;
        }

        .total-row.grand-total {
            font-size: 1.3rem;
            font-weight: 600;
            color: #fdfaf2;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(245, 242, 235, 0.1);
        }

        .total-row.grand-total .amount {
            color: #dfba73;
        }

        /* Custom Form Input Fields */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #d1c7bd;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            width: 100%;
            background: #1e002b;
            border: 1px solid rgba(245, 242, 235, 0.2);
            color: #f5f2eb;
            padding: 12px 16px;
            font-size: 0.95rem;
            outline: none;
            border-radius: 2px;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            border-color: #dfba73;
        }

        /* Payment Method Radio Selectors */
        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .method-option {
            background: rgba(20, 0, 30, 0.5);
            border: 1px solid rgba(245, 242, 235, 0.1);
            border-radius: 2px;
            padding: 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .method-option:hover {
            border-color: rgba(223, 186, 115, 0.3);
        }

        .method-option input[type="radio"] {
            margin-right: 15px;
            accent-color: #dfba73;
            width: 16px;
            height: 16px;
        }

        .method-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fdfaf2;
        }

        /* Form Inline Row Split */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Final Action Button */
        .pay-now-btn {
            width: 100%;
            padding: 18px;
            background: #dfba73;
            color: #1e002b;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            border-radius: 2px;
            margin-top: 10px;
        }

        .pay-now-btn:hover {
            background: #fdfaf2;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="page-header">
            <h1 class="page-title">Secure Checkout</h1>
            <p class="secure-notice">🔒 End-to-End Encrypted Transaction</p>
        </header>

        <main class="checkout-layout">
            
            <!-- Column 1: Review Purchase Details -->
            <section class="checkout-card">
                <h2 class="card-heading">1. Order Summary</h2>
                
                <div id="checkoutItemsList">
                    <!-- Dynamic cart items from localStorage will overwrite this section -->
                </div>

                <div class="totals-section">
                    <div class="total-row">
                        <span>Bag Subtotal</span>
                        <span id="subtotalDisplay">₹0.00</span>
                    </div>
                    <div class="total-row">
                        <span>Estimated Shipping</span>
                        <span style="color: #5cb85c;">FREE</span>
                    </div>
                    <div class="total-row grand-total">
                        <span>Total Due</span>
                        <span class="amount" id="grandTotalDisplay">₹0.00</span>
                    </div>
                </div>
            </section>

            <!-- Column 2: Payment Execution Center -->
            <section class="checkout-card">
                <h2 class="card-heading">2. Select Payment Method</h2>
                
                <form id="paymentForm" onsubmit="executePayment(event)">
                    <div class="payment-methods">
                        <!-- UPI Variant Option -->
                        <label class="method-option">
                            <input type="radio" name="paymentMethod" value="upi" checked onclick="togglePaymentFields('upi')">
                            <span class="method-title">UPI (GPay / PhonePe / Paytm)</span>
                        </label>
                        
                        <!-- Cards Variant Option -->
                        <label class="method-option">
                            <input type="radio" name="paymentMethod" value="card" onclick="togglePaymentFields('card')">
                            <span class="method-title">Credit / Debit Card</span>
                        </label>
                    </div>

                    <!-- Dynamic Fields Holder Interface -->
                    <div id="dynamicFieldsContainer">
                        <!-- UPI Inputs View -->
                        <div id="upiFields" class="payment-inputs">
                            <div class="form-group">
                                <label for="vpaAddress">Enter UPI ID (VPA)</label>
                                <input type="text" id="vpaAddress" class="input-field" placeholder="username@okhdfcbank" required>
                            </div>
                        </div>

                        <!-- Card Inputs View (Hidden by Default) -->
                        <div id="cardFields" class="payment-inputs" style="display: none;">
                            <div class="form-group">
                                <label for="cardName">Cardholder Name</label>
                                <input type="text" id="cardName" class="input-field" placeholder="As it appears on card">
                            </div>
                            <div class="form-group">
                                <label for="cardNumber">Card Number</label>
                                <input type="text" id="cardNumber" class="input-field" placeholder="0000 0000 0000 0000" maxlength="19">
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="cardExpiry">Expiry Date</label>
                                    <input type="text" id="cardExpiry" class="input-field" placeholder="MM/YY" maxlength="5">
                                </div>
                                <div class="form-group">
                                    <label for="cardCvv">CVV Code</label>
                                    <input type="password" id="cardCvv" class="input-field" placeholder="•••" maxlength="3">
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="pay-now-btn" id="submitPaymentBtn">Authorize Payment</button>
                </form>
            </section>

        </main>
    </div>

    <script>
        // Synchronized Runtime Logic: Loads identical products saved from products.html
        let savedCart = JSON.parse(localStorage.getItem('perfumeCart')) || [];

        const checkoutItemsList = document.getElementById('checkoutItemsList');
        const subtotalDisplay = document.getElementById('subtotalDisplay');
        const grandTotalDisplay = document.getElementById('grandTotalDisplay');

        function loadCheckoutDetails() {
            checkoutItemsList.innerHTML = '';
            let subtotal = 0;

            if (savedCart.length === 0) {
                checkoutItemsList.innerHTML = `
                    <p style="text-align:center; color:#d1c7bd; padding:20px 0;">
                        Your cart is empty. <br><br>
                        <a href="products.html" style="color:#dfba73; text-decoration:none; font-weight:600;">← Return to Master Collection</a>
                    </p>`;
                subtotalDisplay.textContent = "₹0.00";
                grandTotalDisplay.textContent = "₹0.00";
                document.getElementById('submitPaymentBtn').disabled = true;
                return;
            }

            // Loop through active local cart contexts and print elements dynamically
            savedCart.forEach(item => {
                subtotal += item.totalPrice;
                
                const summaryItem = document.createElement('div');
                summaryItem.classList.add('summary-item');
                summaryItem.innerHTML = `
                    <div class="item-details">
                        <h4>${item.name}</h4>
                        <p>Size: ${item.size} | Quantity: ${item.quantity}</p>
                    </div>
                    <div class="item-total-price">₹${item.totalPrice.toLocaleString('en-IN')}.00</div>
                `;
                checkoutItemsList.appendChild(summaryItem);
            });

            subtotalDisplay.textContent = `₹${subtotal.toLocaleString('en-IN')}.00`;
            grandTotalDisplay.textContent = `₹${subtotal.toLocaleString('en-IN')}.00`;
        }

        // Manages visibility of fields based on the chosen gateway option
        function togglePaymentFields(method) {
            const upiFields = document.getElementById('upiFields');
            const cardFields = document.getElementById('cardFields');
            
            const vpaInput = document.getElementById('vpaAddress');
            const cardName = document.getElementById('cardName');
            const cardNumber = document.getElementById('cardNumber');
            const cardExpiry = document.getElementById('cardExpiry');
            const cardCvv = document.getElementById('cardCvv');

            if (method === 'upi') {
                upiFields.style.display = 'block';
                cardFields.style.display = 'none';
                vpaInput.required = true;
                
                cardName.required = false;
                cardNumber.required = false;
                cardExpiry.required = false;
                cardCvv.required = false;
            } else {
                upiFields.style.display = 'none';
                cardFields.style.display = 'block';
                vpaInput.required = false;
                
                cardName.required = true;
                cardNumber.required = true;
                cardExpiry.required = true;
                cardCvv.required = true;
            }
        }

        // Simulates the API handshake process
        function executePayment(event) {
            event.preventDefault();
            const submitBtn = document.getElementById('submitPaymentBtn');
            
            submitBtn.textContent = "Processing Transaction...";
            submitBtn.disabled = true;
            submitBtn.style.background = "#d1c7bd";
            submitBtn.style.color = "#1e002b";

            // Mocking secure transaction timeout execution
            setTimeout(() => {
                alert("🎉 Order Placed Successfully! Your transaction has been authorized.");
                submitBtn.textContent = "Payment Successful";
                submitBtn.style.background = "#5cb85c";
                submitBtn.style.color = "#fff";
                
                // Clear customer bucket details post completion
                localStorage.removeItem('perfumeCart');
            }, 2000);
        }

        // Load the stored cart details right as the page displays
        loadCheckoutDetails();
    </script>
</body>
</html>
