<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Fragrance Hero</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', serif;
        }

        .hero-section {
            width: 100%;
            height: 100vh;
            /* Smooth gradient blending deep wine and dark purple */
            background: radial-gradient(circle, rgba(74,12,38,1) 0%, rgba(30,0,43,1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #f5f2eb;
            padding: 20px;
        }

        .hero-content {
            max-width: 800px;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #fdfaf2;
        }

        .hero-content p {
            font-size: 1.2rem;
            font-family: sans-serif;
            font-weight: 300;
            letter-spacing: 1px;
            color: #d1c7bd;
            margin-bottom: 40px;
        }

        .cta-button {
            display: inline-block;
            padding: 15px 40px;
            background-color: #dfba73; /* Champagne Gold */
            color: #1e002b;
            text-decoration: none;
            font-family: sans-serif;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.85rem;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background-color: #fdfaf2;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="hero-content">
            <h1>DOWNTOWN PERFUMERY</h1>
            <p>Fragrances that linger long after you leave. Handcrafted in micro-batches.</p>
            <a href="products.html" class="cta-button">Explore The Collection</a>
        </div>
    </section>

</body>
</html>
